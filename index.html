           TABLAS DE CONVERSIÓN
        ======================= */

            M: "MAÑANA",
            R: "MAÑANA",
            H: "MAÑANA",
            T: "TARDE",
            N: "NOCHE",
            P: "NOCHE",
            L: "NOCHE"
        };

        function formatearDocente(nombre) {
            if (!nombre || nombre.toString().trim() === "") {
                return "SIN DOCENTE";
            }
            return `DOCENTE - ${nombre.toString().trim()}`;
        }

        function normalizarAula(aula) {
            if (!aula) return "";
            return aula
                .toString()
                .trim()
                .toUpperCase()
                .replace(/\s+/g, "")
                .replace(/-/g, "");
        }

        function normalizarCiclo(valor) {
            if (!valor) return "";

            const romanos = {
                "I": 1,
                "II": 2,
                "III": 3,
                "IV": 4,
                "V": 5,
                "VI": 6
            };

            const v = valor.toString().trim().toUpperCase();

            // Si es romano
            if (romanos[v]) {
                return romanos[v];
            }

            // Si ya es número
            const num = parseInt(v, 10);
            if (!isNaN(num) && num >= 1 && num <= 6) {
                return num;
            }

            // Si no coincide, lo devuelve tal cual (para detectar errores)
            return v;
        }


        function normalizarTurno(valor) {
            if (!valor) {
                return { corto: "", completo: "" };
            }

            const v = valor.toString().trim().toUpperCase();

            // Turno real permitido
            if (v === "M" || v === "R") {
                return { corto: "M", completo: "MAÑANA" };
            }

            if (v === "T") {
                return { corto: "T", completo: "TARDE" };
            }

            if (v === "N" || v === "P") {
                return { corto: "N", completo: "NOCHE" };
            }

            // Fallback por si viene algo raro
            return { corto: v, completo: v };
        }

        function obtenerDocentePorCurso(r, index, totalCursos) {

            const docente1 = limpiarTexto(r["DOCENTE 1"]);
            const docente2 = limpiarTexto(r["DOCENTE 2"]);

            if (docente1 && docente2) {
                return index === 0 ? docente1 : docente2;
            }

            if (docente1) return docente1;

            if (docente2) return docente2;

            return "";
        }

        function limpiarTexto(texto) {
            if (!texto) return "";

            return texto
                .toString()
                .trim()
                .replace(/\s+/g, " "); // reemplaza múltiples espacios por uno solo
        }

        /* =======================
           FUNCIONES AUXILIARES
        ======================= */
        function normalizarLocal(valor) {
            if (!valor) return { abrev: "UNK", full: "" };
            valor = valor.toUpperCase().trim();
            return locales[valor] || { abrev: "UNK", full: valor };
        }

        function primerasLetras(texto, n) {
            if (!texto) return "";

            return texto
                .toString()
                .trim()
                .replace(/[^A-ZÁÉÍÓÚÜÑ ]/gi, "")
                .substring(0, n)
                .toUpperCase();
        }


        function csvCell(value) {
            if (value === null || value === undefined) return "";
            value = value.toString();
            if (value.includes("|") || value.includes('"') || value.includes("\n")) {
                value = value.replace(/"/g, '""');
                return `"${value}"`;
            }
            return value;
        }

        function obtenerAulaPorCurso(r, index, totalCursos) {
            if (totalCursos > 1) {
                // Curso 1 → AULA
                if (index === 0) return normalizarAula(r.AULA);

                // Curso 2 → AULA2 o AULA si no existe
                return normalizarAula(r.AULA2 || r.AULA);
            }
            // Solo un curso → AULA
            return normalizarAula(r.AULA);
        }

     function convertirFechaInicioAStartdate() {
            const valor = (document.getElementById("startDateInput").value || "").trim();
            let match = valor.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);

            if (!match) {
                match = valor.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                if (match) {
                    match = [match[0], match[3], match[2], match[1]];
                }
            }

            if (!match) {
                alert("Ingrese una fecha válida");
                return null;
            }

            const dia = Number(match[1]);
            const mes = Number(match[2]);
            const anio = Number(match[3]);
            const fecha = new Date(anio, mes - 1, dia);

            if (
                fecha.getFullYear() !== anio ||
                fecha.getMonth() !== mes - 1 ||
                fecha.getDate() !== dia
            ) {
                alert("La fecha de inicio no es válida");
                return null;
            }

            return {
                startdate: `${anio}${String(mes).padStart(2, "0")}${String(dia).padStart(2, "0")}`,
                anio
            };
        }

        function obtenerPeriodoSeleccionado(anio) {
            const mesSelect = document.getElementById("monthSelect");
            const nombreMes = mesSelect.options[mesSelect.selectedIndex].text;
            const abrevMes = mesSelect.value;

            return {
                nombreMes,
                abrevMes,
                anio,
                anioCorto: String(anio).slice(-2)
            };
        }

        function descargarCategorias() {
            if (resultadoCategorias.length === 0) {
                alert("No hay datos de categorías");
                return;
            }

            const csv = resultadoCategorias
                .map(row => row.map(csvCell).join(";"))
                .join("\n");

            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csv], {
                type: "text/csv;charset=utf-8;"
            });

            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "categorias PATH.csv";
            a.click();
        }

        /* =======================
           PROCESAMIENTO
        ======================= */
        function procesar() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return alert("Seleccione un archivo");

            const datosFechaInicio = convertirFechaInicioAStartdate();
            if (!datosFechaInicio) return;

            const { startdate, anio } = datosFechaInicio;

            const periodo = obtenerPeriodoSeleccionado(anio);
            if (!periodo) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: "array" });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                let rows = XLSX.utils.sheet_to_json(sheet);

                resultadoPreview = [];
                resultadoCategorias = [];

                const headers = [
                    "shortname", "fullname", "carrera_aula", "turno", "horario",
                    "dni_docente", "docente", "celular_docente", "acceso_docente",
                    "tutor", "numero_estudiantes", "url"
                ];

                resultadoPreview.push(headers);

                resultadoCategorias.push([
                    "category_path",
                    "shortname",
                    "fullname",
                    "format",
                    "templatecourse",
                    "startdate",
                    "enddate"
                ]);

                rows.forEach(r => {
                    const turno = normalizarTurno(r.TURNO);

                    const carreraLimpia = limpiarTexto(r.CARRERA);
                    const carrera3 = primerasLetras(carreraLimpia, 3);

                    const ciclo = normalizarCiclo(r.CICLO);
                    const horario = r.horario || r.HORARIO || "";
                    const cantidad = r.CANTIDAD || "";

                    const cursos = [];

                    // CURSO 1
                    if (r["CURSO 1"]) {
                        cursos.push({
                            curso: limpiarTexto(r["CURSO 1"]),
                            local: normalizarLocal(r["LOCAL 1"])
                        });
                    }

                    // CURSO 2
                    if (r["CURSO 2"]) {
                        cursos.push({
                            curso: limpiarTexto(r["CURSO 2"]),
                            local: normalizarLocal(r["LOCAL 2"] || r["LOCAL 1"])
                        });
                    }

                    cursos.forEach((c, i) => {
                        const sufijo = cursos.length > 1 ? (i === 0 ? "-A" : "-B") : "";

                        const aula = obtenerAulaPorCurso(r, i, cursos.length);
                        const curso4 = primerasLetras(c.curso, 4);

                        const docenteFinal = obtenerDocentePorCurso(r, i, cursos.length);
                        const telefonoFinal = obtenerTelefonoPorCurso(r, i, cursos.length);

                        const shortname =  `AULA${aula}${turno.corto}${sufijo}-${c.local.abrev}-${periodo.abrevMes}${periodo.anioCorto}-${carrera3}-${ciclo}-${curso4}`;
                        const nombreCurso = limpiarTexto(c.curso);
                        const fullname = `AULA-${aula}${sufijo}-${carrera3}-${ciclo}-${periodo.abrevMes}${periodo.anioCorto}-${nombreCurso} (${c.local.full}-${turno.completo})`;
                        
                        resultadoPreview.push([
                            U(shortname),
                            U(fullname),
                            U(carreraLimpia),
                            U(turno.completo),
                            U(horario),
                            "",
                            U(formatearDocente(docenteFinal)),
                            U(telefonoFinal),
                            "SI",
                            "",
                            U(cantidad),
                            ""
                        ]);

                        // CSV de categorías
                        resultadoCategorias.push([
                              U(`${periodo.anio} / ${periodo.nombreMes} / ${r.CARRERA} / ${c.local.full} / ${ciclo}C`),
                            U(shortname),
                            U(fullname),
                            "tiles",
                            "MODZOOM2",
                            startdate,
                            "0"
                        ]);
                    });
                });

                renderPreviewTable();
            };

            reader.readAsArrayBuffer(file);
        }

        /* =======================
           VISTA PREVIA
        ======================= */
        function renderPreviewTable() {
            const table = document.getElementById("previewTable");
            const thead = table.querySelector("thead");
            const tbody = table.querySelector("tbody");

            thead.innerHTML = "";
            tbody.innerHTML = "";

            const trHead = document.createElement("tr");
            resultadoPreview[0].forEach(h => {
                const th = document.createElement("th");
                th.textContent = h;
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);

            for (let i = 1; i < resultadoPreview.length; i++) {
                const tr = document.createElement("tr");
                resultadoPreview[i].forEach(cell => {
                    const td = document.createElement("td");
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }
        }

        /* =======================
           DESCARGA CSV UTF-8 BOM
        ======================= */
        function descargar() {
            if (resultadoPreview.length === 0) {
                alert("No hay datos procesados");
                return;
            }

            const csv = resultadoPreview
                .map(row => row.map(csvCell).join(";"))
                .join("\n");

            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "cursos.csv";
            a.click();
        }
    </script>
